<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>إنشاء حساب - وسيطي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;padding-bottom:0!important;}
    .split{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;}
    /* RIGHT = real photo */
    .s-photo{position:relative;overflow:hidden;}
    .s-photo img{width:100%;height:100%;object-fit:cover;display:block;}
    .s-overlay{
      position:absolute;inset:0;
      background:linear-gradient(160deg,rgba(15,36,96,.80) 0%,rgba(124,58,237,.55) 60%,rgba(13,148,136,.4) 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:40px 36px;
    }
    .brand-wrap{text-align:center;color:#fff;}
    .brand-logo-row{display:inline-flex;align-items:center;gap:12px;margin-bottom:28px;}
    .brand-icon{width:52px;height:52px;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.28);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;backdrop-filter:blur(8px);}
    .brand-name{font-size:1.9rem;font-weight:900;color:#fff;}
    .brand-name span{color:#86efac;}
    .brand-tagline{font-size:1.2rem;font-weight:800;margin-bottom:10px;}
    .brand-desc{font-size:.88rem;color:rgba(255,255,255,.8);line-height:1.7;max-width:300px;margin:0 auto 28px;}
    .feat-list{display:flex;flex-direction:column;gap:10px;}
    .feat-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:10px 14px;backdrop-filter:blur(6px);}
    .feat-item i{color:#86efac;font-size:1.1rem;flex-shrink:0;}
    .feat-item span{font-size:.85rem;color:#fff;font-weight:600;}
    /* LEFT = form */
    .s-form{background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px 44px 48px;overflow-y:auto;}
    .form-inner{width:100%;max-width:400px;}
    .form-logo{display:flex;align-items:center;gap:9px;justify-content:center;margin-bottom:18px;}
    .form-logo .li{width:42px;height:42px;background:linear-gradient(135deg,var(--primary),#4f8ef7);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.25rem;}
    .form-logo .lt{font-size:1.45rem;font-weight:900;color:var(--text);}
    .form-logo .lt span{color:var(--primary);}
    h1.form-title{font-size:1.3rem;font-weight:900;color:var(--text);text-align:center;margin-bottom:5px;}
    .form-sub{font-size:.85rem;color:var(--text-muted);text-align:center;margin-bottom:18px;}
    .form-sub a{color:var(--primary);font-weight:700;text-decoration:none;}
    .role-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
    .rtab{padding:11px 6px;border:1.5px solid var(--border);border-radius:9px;text-align:center;cursor:pointer;transition:all .18s;background:#f8fafc;}
    .rtab i{display:block;font-size:1.25rem;margin-bottom:4px;}
    .rtab span{font-size:.76rem;font-weight:700;color:var(--text-muted);}
    .rtab.active{border-color:var(--primary);background:#eff6ff;}
    .rtab.active span,.rtab.active i{color:var(--primary);}
    .fg{margin-bottom:12px;}
    .fg label{display:block;font-size:.8rem;font-weight:700;color:var(--text);margin-bottom:5px;}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .fw{position:relative;}
    .fw .fi{position:absolute;top:50%;transform:translateY(-50%);right:12px;color:var(--text-muted);font-size:.9rem;pointer-events:none;}
    .fw input{width:100%;padding:10px 36px 10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:'Cairo',sans-serif;font-size:.87rem;color:var(--text);background:#f8fafc;outline:none;transition:border-color .2s,box-shadow .2s;}
    .fw input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:#fff;}
    .str-track{height:4px;border-radius:2px;background:var(--border);margin-top:5px;overflow:hidden;}
    .str-fill{height:100%;border-radius:2px;transition:all .3s;width:0;}
    .str-lbl{font-size:.7rem;color:var(--text-muted);margin-top:4px;}
    .terms-row{display:flex;align-items:flex-start;gap:7px;font-size:.79rem;color:var(--text-muted);margin-bottom:12px;}
    .terms-row input{width:14px;height:14px;accent-color:var(--primary);flex-shrink:0;margin-top:2px;}
    .terms-row a{color:var(--primary);font-weight:700;}
    .btn-reg{width:100%;padding:13px;background:linear-gradient(135deg,var(--primary),#4f8ef7);color:#fff;border:none;border-radius:9px;font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:800;cursor:pointer;transition:all .2s;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:7px;}
    .btn-reg:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.35);}
    .or-div{display:flex;align-items:center;gap:10px;color:var(--text-muted);font-size:.76rem;margin-bottom:10px;}
    .or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--border);}
    .social-row{display:flex;gap:8px;margin-bottom:14px;}
    .btn-soc{flex:1;padding:9px;border:1.5px solid var(--border);border-radius:8px;background:#f8fafc;cursor:pointer;font-family:'Cairo',sans-serif;font-size:.79rem;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:center;gap:7px;transition:all .18s;}
    .btn-soc:hover{border-color:var(--primary);background:#eff6ff;}
    .auth-sw{text-align:center;font-size:.83rem;color:var(--text-muted);}
    .auth-sw a{color:var(--primary);font-weight:700;text-decoration:none;}
    @media(max-width:900px){
      .split{grid-template-columns:1fr;}
      .s-photo{height:220px;}
      .s-photo img{height:220px;}
      .feat-list,.brand-desc{display:none;}
      .s-form{padding:24px 18px 84px;}
      .row2{grid-template-columns:1fr;}
    }
    @media(max-width:480px){
      .s-form{padding:18px 12px 84px;}
    }
  </style>
</head>
<body>
<div class="split">

  <!-- RIGHT: Real Photo -->
  <div class="s-photo">
    <img src="https://images.unsplash.com/photo-1521737711867-e3b97375f902?w=900&q=80&auto=format&fit=crop" alt="فريق عمل احترافي"/>
    <div class="s-overlay"></div>
  </div>

  <!-- LEFT: Form -->
  <div class="s-form">
    <div class="form-inner">
      <div class="form-logo">
        <div class="li"><i class="bi bi-shield-fill-check"></i></div>
        <div class="lt"><span>El</span>awaady</div>
      </div>
      <h1 class="form-title">إنشاء حساب جديد</h1>
      <p class="form-sub">لديك حساب؟ <a href="login.html">تسجيل الدخول</a></p>

      <div class="role-tabs">
        <div class="rtab active" onclick="setRole(this,'buyer')" id="rt-buyer">
          <i class="bi bi-bag-check" style="color:var(--primary);"></i>
          <span>مشترٍ</span>
        </div>
        <div class="rtab" onclick="setRole(this,'seller')" id="rt-seller">
          <i class="bi bi-shop-window" style="color:#ea580c;"></i>
          <span>بائع</span>
        </div>
        <div class="rtab" onclick="setRole(this,'broker')" id="rt-broker">
          <i class="bi bi-person-badge" style="color:#7c3aed;"></i>
          <span>وسيط</span>
        </div>
      </div>

      <div class="row2">
        <div class="fg">
          <label>الاسم الأول</label>
          <div class="fw"><i class="bi bi-person fi"></i><input type="text" placeholder="محمد" id="fname"/></div>
        </div>
        <div class="fg">
          <label>الاسم الأخير</label>
          <div class="fw"><i class="bi bi-person fi"></i><input type="text" placeholder="العمري" id="lname"/></div>
        </div>
      </div>
      <div class="fg">
        <label>البريد الإلكتروني</label>
        <div class="fw"><i class="bi bi-envelope fi"></i><input type="email" placeholder="example@email.com" id="remail"/></div>
      </div>
      <div class="fg">
        <label>رقم الهاتف</label>
        <div class="fw"><i class="bi bi-phone fi"></i><input type="tel" placeholder="+966 5x xxx xxxx"/></div>
      </div>
      <div class="fg">
        <label>كلمة المرور</label>
        <div class="fw"><i class="bi bi-lock fi"></i><input type="password" placeholder="••••••••" id="rpass" oninput="chkStr(this.value)"/></div>
        <div class="str-track"><div class="str-fill" id="sBar"></div></div>
        <div class="str-lbl" id="sLbl">قوة كلمة المرور</div>
      </div>
      <div class="fg">
        <label>تأكيد كلمة المرور</label>
        <div class="fw"><i class="bi bi-lock-fill fi"></i><input type="password" placeholder="••••••••"/></div>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="terms"/>
        <label for="terms">أوافق على <a href="terms.html">شروط الاستخدام</a> و<a href="privacy.html">سياسة الخصوصية</a></label>
      </div>

      <button class="btn-reg" onclick="doRegister()" id="btnReg">
        <i class="bi bi-person-plus-fill"></i> إنشاء الحساب
      </button>

      <div class="or-div">أو التسجيل عبر</div>
      <div class="social-row">
        <button class="btn-soc" onclick="showToast('التسجيل بجوجل قريباً!')"><i class="bi bi-google" style="color:#ea4335;"></i> جوجل</button>
        <button class="btn-soc" onclick="showToast('التسجيل بتويتر قريباً!')"><i class="bi bi-twitter-x"></i> تويتر X</button>
      </div>
      <div class="auth-sw">لديك حساب؟ <a href="login.html">تسجيل الدخول</a></div>
    </div>
  </div>

</div>
<script src="../assets/script/components.js"></script>
<script>
var currentRole = 'buyer';
function setRole(el, role) {
  currentRole = role;
  document.querySelectorAll('.rtab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
}
function chkStr(val) {
  var bar = document.getElementById('sBar');
  var lbl = document.getElementById('sLbl');
  var s = 0;
  if (val.length >= 8) s++;
  if (/[A-Z]/.test(val)) s++;
  if (/[0-9]/.test(val)) s++;
  if (/[^A-Za-z0-9]/.test(val)) s++;
  var c = ['#dc2626','#f59e0b','#16a34a','#16a34a'];
  var l = ['ضعيفة','متوسطة','قوية','قوية جداً'];
  bar.style.width = (s * 25) + '%';
  bar.style.background = c[s-1] || '#dc2626';
  lbl.textContent = val ? (l[s-1] || 'ضعيفة جداً') : 'قوة كلمة المرور';
  lbl.style.color = c[s-1] || '#94a3b8';
}
function doRegister() {
  var fname = document.getElementById('fname').value.trim();
  var email = document.getElementById('remail').value.trim();
  if (!fname || !email) { showToast('يرجى ملء الحقول المطلوبة', 'error'); return; }
  if (!document.getElementById('terms').checked) { showToast('يجب الموافقة على الشروط', 'error'); return; }
  var btn = document.getElementById('btnReg');
  btn.innerHTML = '<i class="bi bi-hourglass-split"></i> جاري إنشاء الحساب...';
  btn.disabled = true;
  var dest = { buyer: 'buyer-profile.html', seller: 'seller-profile.html', broker: 'broker-profile.html' };
  setTimeout(function(){
    showToast('تم إنشاء حسابك بنجاح! 🎉');
    setTimeout(function(){ location.href = dest[currentRole] || 'buyer-profile.html'; }, 900);
  }, 1200);
}
</script>
</body>
</html>
