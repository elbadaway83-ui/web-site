<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تسجيل الدخول - وسيطي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;padding-bottom:0!important;}
    /* SPLIT */
    .split{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;}
    /* RIGHT = real photo */
    .s-photo{position:relative;overflow:hidden;}
    .s-photo img{width:100%;height:100%;object-fit:cover;display:block;}
    .s-photo-overlay{
      position:absolute;inset:0;
      background:linear-gradient(160deg,rgba(15,36,96,.82) 0%,rgba(26,111,255,.55) 60%,rgba(13,148,136,.45) 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:40px 36px;
    }
    .brand-wrap{text-align:center;color:#fff;position:relative;z-index:2;}
    .brand-logo-row{display:inline-flex;align-items:center;gap:12px;margin-bottom:28px;}
    .brand-icon{width:52px;height:52px;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.28);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;backdrop-filter:blur(8px);}
    .brand-name{font-size:1.9rem;font-weight:900;color:#fff;}
    .brand-name span{color:#86efac;}
    .brand-tagline{font-size:1.2rem;font-weight:800;margin-bottom:10px;}
    .brand-desc{font-size:.88rem;color:rgba(255,255,255,.8);line-height:1.7;max-width:300px;margin:0 auto 28px;}
    .feat-list{display:flex;flex-direction:column;gap:10px;}
    .feat-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:10px 14px;backdrop-filter:blur(6px);}
    .feat-item i{color:#86efac;font-size:1.1rem;flex-shrink:0;}
    .feat-item span{font-size:.85rem;color:#fff;font-weight:600;}
    /* LEFT = form */
    .s-form{background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 44px;overflow-y:auto;}
    .form-inner{width:100%;max-width:380px;}
    .form-logo{display:flex;align-items:center;gap:9px;justify-content:center;margin-bottom:22px;}
    .form-logo .li{width:44px;height:44px;background:linear-gradient(135deg,var(--primary),#4f8ef7);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.35rem;}
    .form-logo .lt{font-size:1.5rem;font-weight:900;color:var(--text);}
    .form-logo .lt span{color:var(--primary);}
    h1.form-title{font-size:1.35rem;font-weight:900;color:var(--text);text-align:center;margin-bottom:5px;}
    .form-sub{font-size:.87rem;color:var(--text-muted);text-align:center;margin-bottom:22px;}
    .form-sub a{color:var(--primary);font-weight:700;text-decoration:none;}
    .role-tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg);border-radius:10px;padding:4px;}
    .rtab{flex:1;padding:8px 6px;border:none;border-radius:7px;background:transparent;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:700;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .18s;}
    .rtab.active{background:#fff;color:var(--primary);box-shadow:0 1px 6px rgba(0,0,0,.08);}
    .rtab i{font-size:.9rem;}
    .fg{margin-bottom:14px;}
    .fg label{display:block;font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:6px;}
    .fw{position:relative;}
    .fw .fi{position:absolute;top:50%;transform:translateY(-50%);right:13px;color:var(--text-muted);font-size:.95rem;pointer-events:none;}
    .fw input{width:100%;padding:11px 40px 11px 14px;border:1.5px solid var(--border);border-radius:9px;font-family:'Cairo',sans-serif;font-size:.9rem;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s,box-shadow .2s;}
    .fw input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:#fff;}
    .extras-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:.82rem;}
    .rem-label{display:flex;align-items:center;gap:6px;color:var(--text-muted);cursor:pointer;}
    .rem-label input{width:14px;height:14px;accent-color:var(--primary);}
    .forgot-link{color:var(--primary);font-weight:700;text-decoration:none;}
    .forgot-link:hover{text-decoration:underline;}
    .btn-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--primary),#4f8ef7);color:#fff;border:none;border-radius:9px;font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:800;cursor:pointer;transition:all .2s;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;}
    .btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.35);}
    .or-div{display:flex;align-items:center;gap:10px;color:var(--text-muted);font-size:.78rem;margin-bottom:12px;}
    .or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--border);}
    .social-row{display:flex;gap:8px;margin-bottom:18px;}
    .btn-soc{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;font-family:'Cairo',sans-serif;font-size:.8rem;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:center;gap:7px;transition:all .18s;}
    .btn-soc:hover{border-color:var(--primary);background:var(--primary-light);}
    .auth-sw{text-align:center;font-size:.85rem;color:var(--text-muted);}
    .auth-sw a{color:var(--primary);font-weight:700;text-decoration:none;}
    /* MOBILE */
    @media(max-width:900px){
      .split{grid-template-columns:1fr;min-height:auto;}
      .s-photo{height:260px;}
      .s-photo img{height:260px;}
      .feat-list{display:none;}
      .brand-desc{display:none;}
      .s-form{padding:28px 20px 84px;}
    }
    @media(max-width:480px){
      .s-form{padding:20px 14px 84px;}
    }
  </style>
</head>
<body>
<div class="split">

  <!-- RIGHT: Real Photo -->
  <div class="s-photo">
    <img src="https://images.unsplash.com/photo-1600880292203-757bb62b4baf?w=900&q=80&auto=format&fit=crop" alt="فريق عمل احترافي"/>
    <div class="s-photo-overlay">
      <div class="brand-wrap">
        <div class="brand-logo-row">
          <div class="brand-icon"><i class="bi bi-shield-fill-check"></i></div>
          <div class="brand-name">وسيط<span>ي</span></div>
        </div>
        <div class="brand-tagline">صفقاتك في أمان تام</div>
        <div class="brand-desc">منصة الوساطة الرقمية التي تجمع البائع والمشتري بوسيط موثوق يضمن حق الجميع.</div>
        <div class="feat-list">
          <div class="feat-item"><i class="bi bi-shield-check-fill"></i><span>أموالك محمية حتى اكتمال الصفقة</span></div>
          <div class="feat-item"><i class="bi bi-patch-check-fill"></i><span>وسطاء موثقون ومُعتمدون</span></div>
          <div class="feat-item"><i class="bi bi-headset"></i><span>دعم فني متاح ٢٤/٧</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- LEFT: Form -->
  <div class="s-form">
    <div class="form-inner">
      <div class="form-logo">
        <div class="li"><i class="bi bi-shield-fill-check"></i></div>
        <div class="lt">وسيط<span>ي</span></div>
      </div>
      <h1 class="form-title">مرحباً بعودتك</h1>
      <p class="form-sub">ليس لديك حساب؟ <a href="register.html">إنشاء حساب مجاني</a></p>

      <div class="role-tabs">
        <button class="rtab active" onclick="setRole(this,'buyer')" id="rt-buyer"><i class="bi bi-bag-check"></i> مشترٍ</button>
        <button class="rtab" onclick="setRole(this,'seller')" id="rt-seller"><i class="bi bi-shop-window"></i> بائع</button>
        <button class="rtab" onclick="setRole(this,'broker')" id="rt-broker"><i class="bi bi-person-badge"></i> وسيط</button>
      </div>

      <div class="fg">
        <label>البريد الإلكتروني</label>
        <div class="fw">
          <i class="bi bi-envelope fi"></i>
          <input type="email" placeholder="example@email.com" id="loginEmail"/>
        </div>
      </div>
      <div class="fg">
        <label>كلمة المرور</label>
        <div class="fw">
          <i class="bi bi-lock fi"></i>
          <input type="password" placeholder="••••••••" id="loginPass"/>
        </div>
      </div>
      <div class="extras-row">
        <label class="rem-label"><input type="checkbox" id="rememberMe"/> تذكرني</label>
        <a href="#" class="forgot-link" onclick="showToast('سيتم إرسال رابط استعادة كلمة المرور لبريدك')">نسيت كلمة المرور؟</a>
      </div>
      <button class="btn-login" onclick="doLogin()" id="btnLogin">
        <i class="bi bi-box-arrow-in-right"></i> تسجيل الدخول
      </button>
      <div class="or-div">أو الدخول عبر</div>
      <div class="social-row">
        <button class="btn-soc" onclick="showToast('الدخول بجوجل قريباً!')"><i class="bi bi-google" style="color:#ea4335;"></i> جوجل</button>
        <button class="btn-soc" onclick="showToast('الدخول بتويتر قريباً!')"><i class="bi bi-twitter-x"></i> تويتر X</button>
      </div>
      <div class="auth-sw">ليس لديك حساب؟ <a href="register.html">إنشاء حساب الآن</a></div>
    </div>
  </div>

</div>

<script src="../assets/script/components.js"></script>
<script>
var currentRole = 'buyer';
function setRole(el, role) {
  currentRole = role;
  document.querySelectorAll('.rtab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
}
function doLogin() {
  var email = document.getElementById('loginEmail').value.trim();
  var pass  = document.getElementById('loginPass').value;
  if (!email || !pass) { showToast('يرجى إدخال البريد وكلمة المرور', 'error'); return; }
  var btn = document.getElementById('btnLogin');
  btn.innerHTML = '<i class="bi bi-hourglass-split"></i> جاري الدخول...';
  btn.disabled = true;
  var dest = { buyer: 'buyer-profile.html', seller: 'seller-profile.html', broker: 'broker-profile.html' };
  setTimeout(function(){
    showToast('تم تسجيل الدخول بنجاح!');
    setTimeout(function(){ location.href = dest[currentRole] || 'buyer-profile.html'; }, 900);
  }, 1000);
}
</script>
</body>
</html>
